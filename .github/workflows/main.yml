name: Build RasFocus (MSVC)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSVC Compiler Environment
      uses: ilammy/msvc-dev-cmd@v1

    # 🟢 1. WebView2 Caching (বারবার ডাউনলোড ঠেকানোর জন্য)
    - name: Cache WebView2 SDK
      id: cache-webview2
      uses: actions/cache@v4
      with:
        path: packages
        key: webview2-1.0.2420.47

    - name: Install WebView2 SDK via NuGet
      if: steps.cache-webview2.outputs.cache-hit != 'true'
      run: nuget install Microsoft.Web.WebView2 -Version 1.0.2420.47 -OutputDirectory packages

    # 🟢 2. Firebase SDK Caching (সবচেয়ে বেশি সময় বাঁচাবে)
    - name: Cache Firebase SDK
      id: cache-firebase
      uses: actions/cache@v4
      with:
        path: firebase_cpp_sdk
        key: firebase-cpp-sdk-12.4.0

    # 🟢 3. আপনার ভেরিফাইড কোড: শুধুমাত্র ক্যাশ না থাকলে ডাউনলোড ও আনজিপ করবে
    - name: Download and Setup Firebase C++ SDK
      if: steps.cache-firebase.outputs.cache-hit != 'true'
      run: |
        curl -L https://dl.google.com/firebase/sdk/cpp/firebase_cpp_sdk_12.4.0.zip -o firebase.zip
        powershell Expand-Archive -Path firebase.zip -DestinationPath . -Force
        del firebase.zip

    - name: Compile Resources
      run: rc.exe resources.rc

    - name: Compile RasFocus.exe (Super Fast Optimized & Auto Lib Finder)
      shell: pwsh
      run: |
        # -notmatch "Debug" যুক্ত করা হয়েছে যাতে শুধু মেইন/রিলিজ ফাইলটাই সিলেক্ট হয়
        # firebase_app.lib খোঁজা
        $libPath = (Get-ChildItem -Path .\firebase_cpp_sdk\libs -Filter firebase_app.lib -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -match "MT" -and $_.FullName -notmatch "Debug" }).FullName | Select-Object -First 1
        if (!$libPath) {
            $libPath = (Get-ChildItem -Path .\firebase_cpp_sdk\libs -Filter firebase_app.lib -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -notmatch "Debug" }).FullName | Select-Object -First 1
        }

        # firebase_firestore.lib খোঁজা
        $firestorePath = (Get-ChildItem -Path .\firebase_cpp_sdk\libs -Filter firebase_firestore.lib -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -match "MT" -and $_.FullName -notmatch "Debug" }).FullName | Select-Object -First 1
        if (!$firestorePath) {
            $firestorePath = (Get-ChildItem -Path .\firebase_cpp_sdk\libs -Filter firebase_firestore.lib -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -notmatch "Debug" }).FullName | Select-Object -First 1
        }

        # firebase_auth.lib খোঁজা (firestore এর g_auth_initializer dependency)
        $authPath = (Get-ChildItem -Path .\firebase_cpp_sdk\libs -Filter firebase_auth.lib -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -match "MT" -and $_.FullName -notmatch "Debug" }).FullName | Select-Object -First 1
        if (!$authPath) {
            $authPath = (Get-ChildItem -Path .\firebase_cpp_sdk\libs -Filter firebase_auth.lib -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -notmatch "Debug" }).FullName | Select-Object -First 1
        }

        Write-Host "🎯 firebase_app.lib       -> $libPath"
        Write-Host "🔥 firebase_firestore.lib -> $firestorePath"
        Write-Host "🔑 firebase_auth.lib      -> $authPath"

        # 🟢 /MP ফ্ল্যাগ: মাল্টি-কোর দিয়ে দ্রুত বিল্ড। dbghelp.lib: absl symbolize dependency।
        cl.exe /MP /EHsc /MT /O2 /GL /utf-8 /W3 main.cpp prewindow.cpp tab_dashboard.cpp tab_family_link.cpp browser/advanced_feature.cpp browser/feature_browser.cpp browser/bookmarks.cpp browser/context_menu.cpp browser/downloads_panel.cpp browser/find_in_page.cpp browser/history_panel.cpp browser/settings.cpp browser/keyboard_shortcuts.cpp pdf_reader/tab_pdf_workspace.cpp upgrade.cpp browser/mini_browser.cpp tab_blocks.cpp tab_schedule_blocks.cpp tab_adult.cpp tab_deep_study.cpp tab_special.cpp tab_statistics.cpp tab_settings.cpp tab_utilities.cpp tab_device_block.cpp tab_diary.cpp accounts.cpp resources.res /I"./packages/Microsoft.Web.WebView2.1.0.2420.47/build/native/include" /I"./firebase_cpp_sdk/include" /link /LTCG /OPT:REF /OPT:ICF /SUBSYSTEM:WINDOWS /OUT:RasFocus.exe user32.lib gdi32.lib gdiplus.lib comctl32.lib ole32.lib oleaut32.lib uiautomationcore.lib uuid.lib psapi.lib shlwapi.lib winmm.lib shell32.lib urlmon.lib wininet.lib comdlg32.lib advapi32.lib crypt32.lib ws2_32.lib rpcrt4.lib secur32.lib bcrypt.lib dbghelp.lib "./packages/Microsoft.Web.WebView2.1.0.2420.47/build/native/x64/WebView2LoaderStatic.lib" "$libPath" "$firestorePath" "$authPath"

    - name: Sign RasFocus.exe
      run: |
        signtool sign /f "RasAppsCert.pfx" /p "1234" /t http://timestamp.digicert.com /fd SHA256 "RasFocus.exe"

    - name: Upload Artifact (Single Downloadable EXE)
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-App-Signed
        path: RasFocus.exe
